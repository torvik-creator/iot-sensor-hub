name: Bug Report
description: Report a reproducable bug in the project
title: "[BUG] - "
labels: [bug]
body:
 - type: textarea
   attributes:
     label: Steps to Reproduce
     description: Please list the steps to reproduce the issue.
     placeholder: |
       1. Go to...
       2. Click on...
       3. Scroll down to...
  - type: textarea
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
  - type: textarea
    attributes:
      label: Environment Details
      description: OS, browser, device, or any specific version info.
